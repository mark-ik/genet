# against a real, complete engine API (Boa 0.21), and that Appendix A Findings 1
# (explicit traced captures) and 2 (native-data reflector) actually compile + run.
[package]
name = "script-engine-probe"
version = "0.0.0"
edition = "2021"
publish = false

[dependencies]
boa_engine = "0.21"
boa_gc = "0.21"   # Trace/Finalize derives emit `boa_gc::` paths

[workspace]
