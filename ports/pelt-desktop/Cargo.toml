[package]
name = "pelt-desktop"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "pelt_desktop"
path = "lib.rs"
bench = false

[features]
default = ["viewer"]
# The on-screen static-document viewer (V1): load a document via a
# `ResourceFetcher`, render it through `serval-render`, present it through
# `serval-winit-host`. Default-on so `pelt --engine static <file>` works out of
# the box; `--no-default-features` keeps the light contracts + smoke build.
viewer = ["dep:netrender", "dep:serval-render", "dep:serval-static-dom", "dep:serval-layout", "dep:serval-winit-host", "dep:data-url", "dep:wgpu"]
# The scripted profile (V4): a live `ScriptedDom` document whose inline `<script>`
# runs through `script-runtime-api` on a JS engine, mutating the DOM, rendered each
# frame. GPU-free at the core (scene production only); the headed run reuses the
# `viewer` feature's present stack. Boa is the default engine (pure Rust, all
# targets); Nova is gated behind `scripted-nova` so the default build links a single
# engine (Boa+Nova+wgpu together exceed the Windows image-size link limit).
scripted = [
    "dep:netrender", "dep:serval-render", "dep:serval-static-dom", "dep:serval-layout",
    "dep:script-runtime-api", "dep:script-engine-api",
    "dep:serval-scripted-dom", "dep:script-engine-boa", "dep:layout-dom-api",
]
# Add the Nova engine to the scripted profile (native-only). Off by default; enabling
# it links a second engine, which on Windows can exceed the linker's image-size limit
# alongside wgpu — build it on Linux/macOS, or Windows without the present stack.
scripted-nova = ["scripted", "dep:script-engine-nova"]
# The chrome profile (V2): browser chrome (omnibar + back/forward) built as
# xilem-serval views over a second `ScriptedDom`, rendered GPU-free through
# serval-render. No JS engine — the chrome is view-driven, not script-driven (a
# sanctioned mod tier is a later lane). The windowed two-root shell additionally
# needs `viewer` for the present stack + the content document.
chrome = [
    "dep:netrender", "dep:serval-render", "dep:serval-layout", "dep:serval-scripted-dom",
    "dep:layout-dom-api", "dep:xilem-serval", "dep:arboard",
]
# The tile-tree surface (V5): splits + tab-stacks of live documents, rendered as
# xilem-serval flex DOM (the frame) with each tile's document composited into its
# content area. Builds on `chrome` (the xilem-serval render path) + `viewer` (the
# content LoadedDocument + present stack).
tiles = ["chrome", "viewer"]
# Remote document loading (V1's http(s) half): the `LocalFetcher` gains an http(s)
# branch backed by the netfetcher engine (the sibling Fetch network engine; the same
# wiring serval-wpt's `fetch()` uses). Off by default so the default build stays free
# of the async network stack -- `pelt --engine static https://…` needs this. The host
# owns networking here (pelt is the reference shell), matching meerkat driving
# netfetcher in the product; serval's engine components stay byte-consuming.
netfetch = ["viewer", "dep:netfetcher", "dep:tokio", "dep:bytes", "dep:url"]
netrender = ["dep:netrender", "dep:webgl_wgpu", "dep:wgpu"]
# Headed presentation through serval's `WindowsDxgiBackend`. Drives
# the netrender renderer through the C4 DCOMP composition swapchain
# attached to a winit window's HWND. Windows-only at runtime; the
# feature gate is platform-agnostic so `cargo check --features
# windows-present` works on non-Windows hosts (the inner code is
# `cfg(target_os = "windows")` gated).
windows-present = ["netrender", "dep:paint", "dep:raw-window-handle", "dep:windows", "dep:pollster"]
# Headed presentation through serval's `MacosCALayerBackend`. Drives
# the netrender renderer through the C4 CAMetalLayer attached to a
# winit window's NSView. macOS/iOS-only at runtime; the feature gate
# is platform-agnostic so `cargo check --features macos-present`
# works on non-Apple hosts (the inner code is `cfg(target_vendor =
# "apple")` gated). The NSView -> CALayer extraction lives in
# `paint::compositor_factory`; pelt-desktop calls
# `default_compositor_for_window` and doesn't need its own AppKit
# / objc2 deps.
macos-present = [
    "netrender",
    "dep:paint",
    "dep:raw-window-handle",
    "dep:pollster",
]
# Headed presentation through serval's `WaylandSubsurfaceBackend`. Drives
# the netrender renderer through a winit Wayland window with per-`SurfaceKey`
# subsurfaces. Linux-only at runtime; the feature gate is platform-agnostic so
# `cargo check --features linux-present` works on non-Linux hosts (the inner
# code is `cfg(target_os = "linux")` gated). The wl_display + wl_surface
# extraction lives in `paint::compositor_factory`; pelt-desktop calls
# `default_compositor_for_window` and doesn't need its own wayland-client deps.
linux-present = [
    "netrender",
    "dep:paint",
    "dep:raw-window-handle",
    "dep:pollster",
]

[dependencies]
netrender = { workspace = true, optional = true }
paint = { workspace = true, optional = true }
pelt-core = { workspace = true }
pollster = { version = "0.4", optional = true }
raw-window-handle = { workspace = true, optional = true }
webgl_wgpu = { workspace = true, optional = true }
wgpu = { version = "29", default-features = false, features = ["std", "parking_lot", "dx12", "metal", "vulkan", "wgsl"], optional = true }
winit = { workspace = true }

# V1 viewer (behind the `viewer` feature): the serval render-driver + present
# core, the static-document parser, and serval-layout's convenience entries.
serval-render = { path = "../../components/serval-render", optional = true }
serval-static-dom = { path = "../../components/serval-static-dom", optional = true }
serval-layout = { path = "../../components/serval-layout", optional = true }
serval-winit-host = { path = "../../components/serval-winit-host", optional = true }
# Spec `data:` URL decoding for the LocalFetcher (percent-encoded + base64 bodies).
data-url = { workspace = true, optional = true }

# Remote document loading (behind the `netfetch` feature): the netfetcher engine
# (sibling repo) for http(s), bridged onto the sync `ResourceFetcher` through a tokio
# runtime. The same dep set serval-wpt's `fetch()` uses.
netfetcher = { path = "../../../netfetcher", optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
bytes = { version = "1", optional = true }
url = { workspace = true, optional = true }

# Scripted profile (behind the `scripted` feature): the browser host surface, the
# live mutable DOM, and the JS engines. `script-engine-api` supplies the
# `ScriptEngine` trait bound the engine-generic `ScriptedDocument<E>` is written
# against; Boa is the default backend, Nova the gated one (`scripted-nova`).
script-runtime-api = { path = "../../components/script-runtime-api", optional = true }
script-engine-api = { path = "../../components/script-engine-api", optional = true }
serval-scripted-dom = { path = "../../components/serval-scripted-dom", optional = true }
script-engine-boa = { path = "../../components/script-engine-boa", optional = true }
script-engine-nova = { path = "../../components/script-engine-nova", optional = true }
# The `LayoutDom` trait (for the inline-`<script>` DOM walk) + QualName parts.
layout-dom-api = { path = "../../components/shared/layout-dom", optional = true }
# Chrome profile (behind the `chrome` feature): the xilem-serval reactive toolkit the
# omnibar + back/forward views are built with, over a ScriptedDom the runner drives.
xilem-serval = { path = "../../components/xilem-serval", optional = true }
# OS clipboard access for the omnibar's Ctrl/Cmd+V paste (chrome feature). Reads only;
# a failed open (e.g. a headless host) degrades to a no-op paste.
arboard = { workspace = true, optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
# Windows-only types (HWND) used by the `windows-present` feature's
# `run_windows_dxgi_present_smoke` to bridge winit's RawWindowHandle
# to paint's WindowsDxgiBackend constructor. Same workspace `windows`
# version paint depends on.
windows = { workspace = true, optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
# Linux-only ash extension NAME constants used by the `linux-present`
# feature's `smoke_wayland::build_vulkan_handles` to enable the dmabuf
# export extensions on the wgpu-hal Vulkan device before handing it to
# wgpu via `Adapter::create_device_from_hal`. Version matches paint's
# (which in turn matches wgpu-hal 29's lockfile pin 0.38.0+1.3.281).
ash = "0.38"


[dev-dependencies]
# Offline mock HTTP server for the netfetch (http(s)) integration test, so it runs
# without a live network. Mirrors serval-wpt's fetch()->netfetcher test harness.
mockito = "1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)', 'cfg(llvm_pgo)'] }
