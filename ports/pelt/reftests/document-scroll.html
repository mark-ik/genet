<!doctype html>
<!-- Viewport family: a page taller than the viewport, snapshotted scrolled 400px
     (see document-scroll.scroll) — the painted content is offset by -scroll. -->
<html><head><style>
  body { margin: 0; }
  h1 { background: #cfe; margin: 0; }
  .tall { height: 2000px; background: #fec; }
  h2 { background: #ecf; margin: 0; }
</style></head>
<body><h1>top heading</h1><div class="tall">tall middle</div><h2>bottom heading</h2></body></html>
