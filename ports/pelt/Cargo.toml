[package]
name = "pelt"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "pelt"
path = "lib.rs"
bench = false

[[bin]]
name = "pelt"
path = "main.rs"
bench = false

[lints.rust]
# These are not official flags but still used for testing and pgo.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)', 'cfg(llvm_pgo)'] }

[features]
default = ["viewer-netrender"]
# viewer-engine pulls the desktop host (smoke runners, present backends).
# The Masonry-era Xilem viewer (pelt-viewer) was retired 2026-06-12 — its
# CPU-readback render path predated direct present; pelt-live is the
# on-screen genet window until a genet-native viewer mode is built on the
# genet-host-api/pelt-desktop contracts. (The egui chrome crate was retired
# 2026-05-20 before it.)
viewer-engine = ["dep:pelt-desktop"]
viewer-netrender = ["viewer-engine", "pelt-desktop/netrender"]
# The scripted profile (V4): `pelt --engine scripted <file>` runs a page's inline
# <script> on a JS engine and renders the mutated DOM. Pulls pelt-desktop's scripted
# runtime on top of the present stack. Boa-only by default (a single engine links
# under the Windows image-size limit alongside wgpu); add `scripted-nova` for Nova.
scripted = ["viewer-engine", "pelt-desktop/viewer", "pelt-desktop/scripted"]
scripted-nova = ["scripted", "pelt-desktop/scripted-nova"]
# The rasterized-PNG reftest lane (V3): `pelt --engine headless --out <file>.png`
# emits a rendered PNG (human-eyes artifact), and `--reftest <dir>` additionally
# compares an optional `name.png` per fixture under a fuzz threshold. GPU-required,
# so opt-in on top of the GPU-free scene-snapshot lane.
png-reftest = ["viewer-engine", "pelt-desktop/png-reftest"]
# The chrome demo (V2): `pelt --chrome <url>` wraps the content viewer in a
# xilem-serval omnibar + back/forward strip. Pulls pelt-desktop's chrome runtime on
# top of the present stack.
chrome = ["viewer-engine", "pelt-desktop/viewer", "pelt-desktop/chrome"]
# The tile-tree demo (V5): `pelt --tiles <url>...` splits the window into tiles, each
# showing a document, with switchable tabs. Pulls pelt-desktop's tile surface.
tiles = ["viewer-engine", "pelt-desktop/viewer", "pelt-desktop/tiles"]
# Remote document loading (V1's http(s) half): `pelt --features netfetch --engine
# static https://…` loads over the netfetcher engine. Off by default — the async
# network stack is opt-in; the default build stays local-first.
netfetch = ["viewer-engine", "pelt-desktop/viewer", "pelt-desktop/netfetch"]
# Smolweb document loading: `pelt --features smolweb --engine static gemini://…`
# renders a native, per-site-themed capsule (gemtext / gopher / feed) over the errand
# transport. Off by default — the async network stack is opt-in.
smolweb = ["viewer-engine", "pelt-desktop/viewer", "pelt-desktop/chrome", "pelt-desktop/smolweb"]
# C4 headed-presentation smoke. Pulls genet's `WindowsDxgiBackend`
# in through `pelt-desktop`. Inner code is `cfg(target_os = "windows")`
# gated so the feature still builds on non-Windows hosts.
windows-present = ["viewer-engine", "pelt-desktop/windows-present"]
# C4 headed-presentation smoke on macOS / iOS. Pulls genet's
# `MacosCALayerBackend` in through `pelt-desktop`. Inner code is
# `cfg(target_vendor = "apple")` gated so the feature still builds
# on non-Apple hosts.
macos-present = ["viewer-engine", "pelt-desktop/macos-present"]
# C4 headed-presentation smoke on Linux. Pulls genet's
# `WaylandSubsurfaceBackend` in through `pelt-desktop`. Inner code is
# `cfg(target_os = "linux")` gated so the feature still builds
# on non-Linux hosts.
linux-present = ["viewer-engine", "pelt-desktop/linux-present"]
[dependencies]
cfg-if = { workspace = true }
genet-host-api = { workspace = true }
pelt-desktop = { workspace = true, optional = true }
windows-sys = { workspace = true, features = ["Win32_Graphics_Gdi", "Win32_System_Console"] }
