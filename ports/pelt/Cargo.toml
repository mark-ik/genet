[package]
name = "pelt"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "pelt"
path = "lib.rs"
bench = false

[[bin]]
name = "pelt"
path = "main.rs"
bench = false

[lints.rust]
# These are not official flags but still used for testing and pgo.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage)', 'cfg(llvm_pgo)'] }

[features]
default = ["viewer-netrender"]
# viewer-engine pulls the desktop host (smoke runners, present backends)
# and the Xilem viewer (the chrome + content window). The egui chrome
# crate was retired 2026-05-20 in favor of the Xilem viewer.
viewer-engine = ["dep:pelt-desktop", "dep:pelt-viewer"]
viewer-netrender = ["viewer-engine", "pelt-desktop/netrender"]
# C4 headed-presentation smoke. Pulls serval's `WindowsDxgiBackend`
# in through `pelt-desktop`. Inner code is `cfg(target_os = "windows")`
# gated so the feature still builds on non-Windows hosts.
windows-present = ["viewer-engine", "pelt-desktop/windows-present"]
# C4 headed-presentation smoke on macOS / iOS. Pulls serval's
# `MacosCALayerBackend` in through `pelt-desktop`. Inner code is
# `cfg(target_vendor = "apple")` gated so the feature still builds
# on non-Apple hosts.
macos-present = ["viewer-engine", "pelt-desktop/macos-present"]

[dependencies]
cfg-if = { workspace = true }
pelt-core = { workspace = true }
pelt-desktop = { workspace = true, optional = true }
pelt-viewer = { workspace = true, optional = true }
windows-sys = { workspace = true, features = ["Win32_Graphics_Gdi", "Win32_System_Console"] }
