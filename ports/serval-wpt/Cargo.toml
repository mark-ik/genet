[package]
name = "serval-wpt"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "serval-native web-platform-tests runner; subset-selectable."

[[bin]]
name = "serval-wpt"
path = "src/main.rs"

[dependencies]
# Phase 1 (crash-smoke): parse + layout, no GPU.
serval-static-dom = { path = "../../components/serval-static-dom" }
serval-layout = { path = "../../components/serval-layout" }
layout_dom_api = { workspace = true }

# Phase 2 (reftests): render to pixels via the paint + netrender path
# (the same public API the html_to_pixels_e2e test drives) and compare.
paint = { workspace = true }
paint_api = { workspace = true }
paint_list_api = { workspace = true }
paint_types = { workspace = true }
netrender = { workspace = true }
wgpu = { workspace = true }
embedder_traits = { workspace = true }
servo-base = { workspace = true }
dpi = { workspace = true }
euclid = { workspace = true }
image = { workspace = true }
# Must match serval-layout's experimental pin (layout() takes a taffy::Size).
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = ["std", "taffy_tree", "block_layout", "flexbox", "grid", "float_layout", "calc", "detailed_layout_info"] }

# Phase 3 (testharness): run testharness.js + the test's scripts on the host
# surface and read results. Boa is the engine (pure Rust, the conformance oracle;
# Nova's regex engine rejects the harness's surrogate ranges — see the plan doc).
script-runtime-api = { path = "../../components/script-runtime-api" }
script-engine-boa = { path = "../../components/script-engine-boa" }
