[package]
name = "pelt-live"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Xilem-on-serval host probe: the lib drives a ScriptedDom through serval layout/paint offline; the pelt-live-counter bin runs the same ServalAppRunner counter in a winit window, presented via netrender."

[lib]
name = "pelt_live"
path = "src/lib.rs"

# Stage 1b-window: a real on-screen winit window that runs the xilem-serval
# counter, rendered by serval and presented via netrender. The lib stays
# headless/GPU-free; this bin carries the windowing + present stack.
[[bin]]
name = "pelt-live-counter"
path = "src/main.rs"

[dependencies]
# Reactive backend: app state -> view tree -> diff -> ScriptedDom mutations.
# Thin (xilem_core + the serval DOM only); the layout/paint stack lives here.
xilem-serval = { path = "../../components/xilem-serval" }
serval-scripted-dom = { path = "../../components/serval-scripted-dom" }
layout_dom_api = { workspace = true }

# serval engine + render path (same set + versions pelt-viewer's static
# viewer uses). serval-layout is a path dep; the rest are workspace deps.
serval-layout = { path = "../../components/serval-layout" }
paint = { workspace = true }
paint_list_api = { workspace = true }
netrender = { workspace = true }
# Engine-observable query surface: ServalLaneView::hit_test (point -> node)
# lives behind FragmentQuery, whose types (Point, SourceNodeId) come from here.
engine_observables_api = { workspace = true }
# Accessibility tree emission: ScriptedDom -> accesskit::TreeUpdate. A host
# concern (a screen-reader adapter consumes it), so it lives here, not in the
# core layout crate.
accesskit = { workspace = true }
# The winit screen-reader adapter for the bin (not a workspace dep; resolves to
# the 0.32.2 already in the lock via masonry_winit, sharing this accesskit 0.24
# and winit 0.30). Bin-only — the lib's a11y builder needs only accesskit.
accesskit_winit = "0.32"

# taffy must match serval-layout's experimental pin (layout() takes a
# taffy::Size viewport). Copied verbatim from pelt-viewer.
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = ["std", "taffy_tree", "block_layout", "flexbox", "grid", "float_layout", "calc", "detailed_layout_info"] }

euclid = { workspace = true }

# Windowing + present stack for the `pelt-live-counter` bin (the lib half stays
# GPU-free). Versions copied from ports/pelt-desktop's Cargo.toml. The window
# creates a `wgpu::Surface`; serval renders the counter scene to an
# `Rgba8Unorm` texture via netrender, which is then blitted onto the surface's
# (typically `Bgra8UnormSrgb`) backbuffer through netrender's own
# `Renderer::compose_external_texture` pass — the same format-bridging blit the
# zero-copy `<img>` overlay path uses, so the bin improvises no GPU code.
winit = { workspace = true }
wgpu = { version = "29", default-features = false, features = ["std", "wgsl"] }
# System clipboard for the bin's Ctrl/Cmd+C/X/V (copy / cut / paste). Bin-only.
arboard = "3"
# Runtime diagnostics for the windowed bin: `tracing` at the host↔runner seams
# (hit-test, dispatch, focus, popup anchor), surfaced through a `fmt` subscriber
# with an env filter. Both resolve to versions already in the lock (no new
# downloads). Driven by `RUST_LOG` (defaults to `pelt_live=info`).
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
