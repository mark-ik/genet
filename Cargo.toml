tokio-stream = "0.1"
tokio-util = { version = "0.7.18", default-features = false }
tower = { version = "0.5", default-features = false, features = ["util"] }
tracing = "0.1.44"
tracing-perfetto = "0.1.5"
tracing-subscriber = "0.3.23"
tungstenite = "0.29"
unicode-bidi = "0.3.18"
unicode_categories = "0.1.1"
# Highlighted-text stack for xilem-serval's optional `highlight` feature: illume
# (portable lexer: djot structure + code injection + prose entities) and tinct
# (perceptual seed-to-palette, with the syntax-role palette). Both are standalone
# sibling libs; xilem-serval is the assembly point that maps illume's kinds onto
# tinct's roles, so every genet host gets highlighted editing for free.
# Adopted as components 2026-07-10 (inker-adoption plan, companion rehomes):
# the text/editing column consolidates here — illume spans, tinct palettes,
# knot-editor-host editor model, xilem-serval text surfaces. Both keep
# MIT/Apache per-crate and their published identities.
illume = { version = "=0.0.2", path = "components/illume" }
tinct = { version = "=0.1.2", path = "components/tinct" }
unicode-properties = { version = "0.1.4", features = ["emoji"] }
unicode-script = "0.5"
unicode-segmentation = "1.13.2"
url = "2.5"
urlpattern = "0.3"
utf-8 = "0.7"
uuid = { version = "1.23.1", features = ["v4", "v5"] }
vello = "0.9"
vello_cpu = "0.0.8"
webdriver = { version = "0.53.0", default-features = false }
webpki-roots = "1.0"
web_atoms = "0.2"
wgpu = "29"
wgpu-core = "29"
wgpu-types = "29"
