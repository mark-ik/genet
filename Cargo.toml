strum = { version = "0.28", features = ["derive"] }
# Workspace-dependency KEY is `style` (not `stylo`) because the package's own
# `[lib] name = "style"` (servo's convention; unchanged by the T1 rename —
# see docs/2026-07-12_ring3_fork_rename_publish_plan.md). Cargo's extern-name
# binding rule: with no `package =` override, a dependency is visible under
# its target's OWN `[lib] name`; ADDING `package =` (needed here, since the
# real crate is renamed to `genet-stylo`) switches that to the TOML key
# instead — so the key must equal the desired import name (`style::...`,
# used workspace-wide) or every consumer's source breaks. `stylo_atoms` /
# `stylo_dom` / `stylo_static_prefs` have no such mismatch (their `[lib]
# name` already equals their old package name), so their keys are untouched.
style = { version = "0.19.0", package = "genet-stylo" }
stylo_atoms = { version = "0.19.0", package = "genet-stylo-atoms" }
stylo_dom = { version = "0.19.0", package = "genet-stylo-dom" }
stylo_malloc_size_of = "0.19.0"
stylo_static_prefs = { version = "0.19.0", package = "genet-stylo-static-prefs" }
stylo_traits = { version = "0.19.0", package = "genet-stylo-traits" }
