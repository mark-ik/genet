[workspace]
resolver = "2"
members = [
    "components/media/examples",
    "components/shared/engine-observables-api",
    "components/shared/paint-types",
    "components/xpath",
    "components/webgl-wgpu",
    "components/webgl-essl",
    "components/genet-layout",
    "components/livery",
    "components/genet-livery",
    "components/genet-static-dom",
    "components/genet-extract",
    "components/genet-scripted-dom",
    "components/genet-scripted",
    "components/genet-scripted-worker",
    "components/genet-static-html",
    "components/xilem-core",
    "components/xilem-serval",
    "components/chisel",
    "components/verso-tile",
    # The engine-management layer, adopted from mere 2026-07-10
    # (docs/2026-07-09_inker_genet_adoption_plan.md): inker (contracts +
    # document/surface registries) with its surface adapters + document-canvas
    # + knot-editor-host nested, and nematic promoted to a top-level component.
    "components/inker",
    "components/inker/document-canvas",
    "components/inker/knot-editor-host",
    "components/inker/engines/scrying-engine",
    "components/inker/engines/graft-engine",
    "components/inker/engines/weld-engine",
    "components/nematic",
    # The smolweb wire layer, adopted 2026-07-10 (same plan): transport + parse,
    # with its spec-faithful protocol crates as members keeping their own
    # published identities.
    "components/errand",
    "components/errand/protocols/nex-protocol",
    "components/errand/protocols/spartan-protocol",
    "components/errand/protocols/guppy-protocol",
    # The text/editing column's portable pair, adopted 2026-07-10 (same plan):
    # illume (lexer/highlighter spans) + tinct (OKLCH palette derivation).
    "components/illume",
    "components/tinct",
    # The content lanes as session engines (2026-07-10 session-engines plan):
    # static/scripted/smolweb retained documents, promoted out of pelt.
    "components/genet-documents",
    "components/genet-winit-host",
    "components/genet-render",
    "components/shared/layout-dom",
    "components/script-engine-api",
    # script-engine-boa joined the workspace 2026-05-25. The old blocker (boa
    # 0.21.1's icu_normalizer ~2.0 vs parley 0.9's ^2.1.1) was resolved by forking
    # boa to crates/boa (`genet` branch) and widening its icu family ~2.0 -> ^2.1,
    # which resolves to icu 2.2.0 — the version nova_vm's temporal_rs -> icu_calendar
    # chain forces, and which parley accepts. Patched in via [patch.crates-io] below.
    "components/script-engine-boa",
    "components/script-engine-nova",
    "components/script-engine-piccolo",
    "components/script-runtime-api",
    "ports/pelt-core",
    "ports/pelt-desktop",
    "ports/pelt",
    "ports/genet-wpt",
    "tests/unit/*",
]
default-members = ["ports/pelt"]
# The SpiderMonkey-backed scripting stack (components/script,
# script_bindings, and the heavy Servo subsystems: layout, net, canvas,
# constellation, devtools, metrics, storage, timers, webdriver_server,
# bluetooth, background_hang_monitor) plus its `tests/unit/script`
# (`script_tests`) were deleted 2026-05-20 — they were already cut from
# the build graph (not workspace members, not reachable from `pelt`).
# Git history is the reference for the eventual scripting rebuild. See
# docs/2026-05-20_stylo_taffy_adoption_plan.md (and the cut commit).
exclude = [".cargo"]

[workspace.package]
version = "0.2.0"
authors = ["The Servo Project Developers"]
repository = "https://github.com/servo/servo"
# A generic description for packages that don't have a meaningful description yet.
description = "A component of the servo web-engine."
license = "MPL-2.0"
edition = "2024"
publish = false
# We have yet to decide on a policy for updating the minimum supported Rust version.
# Before increasing this, please open a discussion on Zulip explaining the reason
# why we should consider increasing our minimum supported Rust version.
# Please also note, that the **default** Rust version in rust-toolchain.toml may be
# bumped freely.
# Skip 1.90 which causes mis-compilation: https://github.com/rust-lang/rust/issues/147265
rust-version = "1.86.0"

[workspace.dependencies]
accesskit = { version = "0.24.0", features = ["serde"] }
# Platform AccessKit adapters for the winit host bridge (genet-winit-host::a11y),
# tracking accesskit 0.24. Target-gated in the consuming crate, so a non-native
# build (wasm) never pulls them.
accesskit_windows = "0.32"
accesskit_macos = "0.26"
accesskit_unix = "0.21"
app_units = "0.7"
arboard = "3"
argon2 = { version = "0.5", features = ["alloc"] }
arrayvec = "0.7"
async-tungstenite = { version = "0.34", features = ["tokio-rustls-webpki-roots"] }
atomic_refcell = "0.1.14"
# aws-lc-rs removed 2026-05-15 per Mark's directive: genet should default to
# pure-Rust crypto, not aws-lc's NASM-required C+asm crypto. The only consumers
# (components/script, components/net) are now either gated out (script via
# tests/unit/script exclusion above) or already dead (net). Crypto provider
# for any future rustls revival should use `ring` (rustls feature `ring`,
# pre-built asm on Windows since ring 0.17 — no NASM needed) or
