webxr = { package = "servo-webxr", version = "=0.2.0", path = "components/webxr" }
webxr-api = { package = "servo-webxr-api", version = "=0.2.0", path = "components/shared/webxr" }
xpath = { package = "servo-xpath", version = "=0.2.0", path = "components/xpath" }
# End workspace-version dependencies - Don't change this comment, we grep for it in scripts!

# RSA key generation could be very slow without compilation
# optimizations, in development mode. Without optimizations, WPT might
# consider RSA key generation tests fail due to timeout.
# Building with higher optimization levels can speed up the key
# generation process to avoid false negative result in those tests.
# More details: <https://docs.rs/rsa/0.9.8/rsa/index.html#example>
[profile.dev.package.num-bigint-dig]
opt-level = 3

# Force tikv-jemalloc-sys to build with at least -O1.
# This can help with build environments that force _FORTIFY_SOURCE, such as Nix.
# More details: <https://github.com/tikv/jemallocator/issues/108>
[profile.dev.package.tikv-jemalloc-sys]
opt-level = 1

# An optimized build for CI, to improve test runtime, but with debug assertions turned on.
[profile.checked-release]
inherits = "release"
debug-assertions = true
overflow-checks = true

# Disk-space is limited in CI, so we disabled features that are not needed for code coverage.
# Locally using the default `dev` profile is perfectly fine.
[profile.coverage]
inherits = "dev"
incremental = false
debug = false

# A profile between `dev` and `release` which aims to offer a compromise between
# fast incremental rebuilds and runtime speed.
[profile.medium]
inherits = "dev"
opt-level = 2
incremental = true
debug = "line-tables-only"

[profile.production]
inherits = "release"
debug-assertions = false
lto = true
codegen-units = 1
opt-level = "s"

[profile.production-stripped]
inherits = "production"
strip = true

[profile.profiling]
inherits = "release"
debug-assertions = false
debug = true
lto = "thin"
codegen-units = 1

[patch.crates-io]
# If you need to temporarily test Servo with a local fork of some upstream
# crate, add that here. Use the form:
#
#     <crate> = { path = "/path/to/local/checkout" }
#
# For html5ever:
#
# html5ever = { path = "../html5ever/html5ever" }
# markup5ever = { path = "../html5ever/markup5ever" }
# web_atoms = { path = "../html5ever/web_atoms" }
# xml5ever = { path = "../html5ever/xml5ever" }
# tendril = { path = "../html5ever/tendril" }
gpu-allocator = { path = "support/patches/gpu-allocator" }
# sonic-rs uses ahash with default features, whose `runtime-rng` pulled getrandom
# 0.3 (hard-codes wasm32) onto the shared ahash. This vendored copy drops
# runtime-rng on wasm (native keeps it), so the wasm graph carries no getrandom 0.3
# and needs no getrandom patch. Retire when ahash ships a release on getrandom 0.4.
sonic-rs = { path = "support/patches/sonic-rs-0.5.8" }
# taffy fork, re-vendored 2026-07-12 onto the newest STABLE release (0.12.1 —
# `float_layout` graduated from experimental, ending the need to ride the
# experimental-cache-fix line). Carries three patches, each upstreamed at our
# own pace (see support/patches/taffy/GENET_PATCHES.md + UPSTREAM_PR.md):
# `find_content_slot` width-fit (a full-width float yielded a zero-width slot
# at its right edge, placing a fixed-width BFC child there instead of below
# the float — present on taffy `main` too), a float exclusion-band accessor
# (feeds genet's parley-measured inline float wrap), and flex `order` (taffy
# does not model CSS `order`). Only the `=0.12.1` requirement (genet-layout +
# stylo_taffy) is redirected; the workspace's plain taffy 0.10.1 is
# unaffected. See docs/2026-07-12_ring3_fork_rename_publish_plan.md (T0) and
# docs/2026-05-31_css_rendering_conformance_plan.md (floats × BFC, the
# original patch's context).
taffy = { path = "support/patches/taffy" }
# stylo_taffy fork, vendored 2026-07-12 at 0.3.0-beta.1 (the first stylo_taffy
# release targeting taffy 0.12.x; alpha.5/6 still pinned the experimental
# line). Two edits from the published source, both to match genet's actual
# stylo fork surface rather than the registry `stylo` lineage stylo_taffy's
# authors track: `TrackBreadth::Flex` reverted to `TrackBreadth::Fr` (our
# fork's servo/stylo-derived variant name/shape; beta.1's is a newtype,
# ours a bare float) — everything else (the taffy 0.12
# AlignContent/AlignItems bitflag-style consts) is upstream's own change,
# taken as-is. See support/patches/stylo_taffy/ and
# docs/2026-07-12_ring3_fork_rename_publish_plan.md (T2).
stylo_taffy = { path = "support/patches/stylo_taffy" }
# Nova fork (genet-embedder branch on github.com/mark-ik/nova). Carries the
# EmbedderObject native-data patch plus the reflector-liveness weak-ref API
# (`EmbedderObject::into_weak_ref`/`from_weak_ref` + `clear_weak_ref_kept_objects`,
# G1 in docs/2026-06-11_gc_arena_dom_plan.md). Git dep so a bare clone resolves
# without the sibling checkout; for local nova dev, the gitignored
# `Code/.cargo/config.toml` `paths` override redirects this to `../../crates/nova`.
nova_vm = { git = "https://github.com/mark-ik/nova", branch = "genet-embedder" }
# Boa fork (genet branch on github.com/mark-ik/boa) tracking boa-upstream main
# (the 1.0.0-dev line). Carries an additive source patch — `JsObject::downgrade()`
# + `WeakJsObject`, for the reflector-liveness weak cache (G1 in
# docs/2026-06-11_gc_arena_dom_plan.md). boa_engine pulls its sibling boa_* crates
# via boa's own intra-repo path deps, so only boa_engine + boa_gc are named from
# crates.io (by script-engine-boa) and need patching. Git deps so a bare clone
# resolves; for local boa dev, the gitignored `Code/.cargo/config.toml` `paths`
# override redirects these to `../../crates/boa`.
# See docs/2026-05-20_genet_script_engine_plan.md.
boa_engine = { git = "https://github.com/mark-ik/boa.git", branch = "genet" }
boa_gc = { git = "https://github.com/mark-ik/boa.git", branch = "genet" }
# ipc-channel: in-process fork, vendored at support/patches/ipc-channel (like
# taffy + gpu-allocator). Servo's multiprocess IPC transport is vestigial in
# genet's single-process embedding (pelt; and mere's library use), so the fork
# defaults to ipc-channel's built-in force-inprocess backend and makes the OS deps
# optional. That drops the windows 0.61 dependency, whose loose <=0.62 range
# otherwise let gpu-allocator latch onto 0.61.3 while wgpu-hal forces 0.62, breaking
# the dx12 suballocator in any build that compiles the dx12 backend (meerkat, via
# scrying). Vendored, not a git fork, since the change is manifest-only.
ipc-channel = { path = "support/patches/ipc-channel" }
# NOTE: stylo/stylo_atoms used to be redirected here via `[patch.crates-io]`
# (unifying stylo_taffy's crates.io `^0.18` requirement with genet's git
# rev, since `stylo` declares `links = "servo_style_crate"` — only one Stylo
# allowed in the graph). Removed 2026-07-12 (T3 of
# docs/2026-07-12_ring3_fork_rename_publish_plan.md, the stylo rename to
# `genet-stylo`/`genet-stylo-atoms`): `[patch]` cannot rename its target
# (the patch source's package name must match the registry name being
# replaced). The renamed family now has its own registry packages, consumed
# through `[workspace.dependencies]` above and directly by the vendored
# stylo_taffy adapter. See docs/2026-05-20_stylo_taffy_adoption_plan.md
# and the css transitions plan for the original rationale.
# vello patch removed 2026-05-15 per Mark's audit — bumping to vello 0.9
# directly from crates.io. If vello upstream needs a fork applied later,
# re-add here pinned to a specific upstream version.
# For WebRender / netrender:
# The netrender/ workspace (formerly the webrender-wgpu fork) dropped
# webrender, webrender_api, and wr_malloc_size_of as separate crates. Local
# stubs in support/patches/ restore workspace loadability while consumers
# are migrated to netrender's surface (post-cut C2-C4 work).

#
# Or for mozjs:
#
# mozjs = { path = "../mozjs/mozjs" }
# mozjs_sys = { path = "../mozjs/mozjs-sys" }
#
# Or for CSP crate:
# content-security-policy = { path = "../rust-content-security-policy" }
#
# Or for Stylo:
#
# [patch."https://github.com/servo/stylo"]
# selectors = { path = "../stylo/selectors" }
# servo_arc = { path = "../stylo/servo_arc" }
# stylo = { path = "../stylo/style" }
# stylo_atoms = { path = "../stylo/stylo_atoms" }
# stylo_dom = { path = "../stylo/stylo_dom" }
# stylo_malloc_size_of = { path = "../stylo/malloc_size_of" }
# stylo_static_prefs = { path = "../stylo/stylo_static_prefs" }
# stylo_traits = { path = "../stylo/style_traits" }
#
# Or for another Git dependency:
