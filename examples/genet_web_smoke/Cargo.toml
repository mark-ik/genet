[package]
name = "genet-web-smoke"
version = "0.1.0"
edition = "2021"
publish = false

# Standalone project — intentionally NOT a genet workspace member
# (same pattern as ../netrender_smoke). Proves the genet engine core
# renders in a browser: cambium view tree -> ScriptedDom ->
# genet-layout -> PaintList -> paint_list_render -> netrender ->
# WebGPU canvas surface. No Servo shell, no winit, no JS engine.
#
# Build (from genet/ root):
#   cargo build --manifest-path examples/genet_web_smoke/Cargo.toml --target wasm32-unknown-unknown
#   wasm-bindgen --target web --out-dir examples/genet_web_smoke/pkg \
#     examples/genet_web_smoke/target/wasm32-unknown-unknown/debug/genet_web_smoke.wasm
#   python -m http.server -d examples/genet_web_smoke 8000
# then open http://localhost:8000 in a WebGPU browser (Chrome/Edge).
#
# netrender crates come from mark-ik/netrender git (converted from the
# first receipt's sibling path deps once the per-target-webgpu commit
# landed on main, per the netrender_smoke pattern).

[lib]
name = "genet_web_smoke"
crate-type = ["cdylib"]
path = "src/lib.rs"

[workspace]

[dependencies]
# View layer (sibling cambium checkout — the extracted successor to the
# in-genet xilem-serval; same sibling-path pattern as netrender below).
# Cambium currently declares genet-scripted-dom by version. Patch that
# registry edge back to this checkout so the ScriptedDom and observable
# contracts unify with genet-layout's graph.
cambium = { path = "../../../cambium/crates/cambium" }

# genet engine core (path deps resolve workspace-inherited fields
# against the genet workspace root).
genet-scripted-dom = { path = "../../components/genet-scripted-dom" }
genet-layout = { path = "../../components/genet-layout" }

# rasterizer stack — git deps matching the genet workspace's own
# netrender source, so paint_list_api unifies with genet-layout's copy
# (the per-target-webgpu commit is on main; the netrender_smoke pattern).
netrender = { git = "https://github.com/mark-ik/netrender.git", branch = "main" }
netrender_device = { git = "https://github.com/mark-ik/netrender.git", branch = "main" }
paint_list_api = { git = "https://github.com/mark-ik/netrender.git", branch = "main" }
paint_list_render = { git = "https://github.com/mark-ik/netrender.git", branch = "main" }

wgpu = { version = "29", default-features = false, features = ["std", "wgsl", "webgpu"] }

# web glue. wasm-bindgen pinned exactly to the installed CLI version.
wasm-bindgen = "=0.2.126"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "console",
] }
console_error_panic_hook = "0.1"

# Mirrors the genet workspace [patch.crates-io] entries this dependency
# graph needs (patches are per-workspace-root, and this example is its
# own workspace). Same rationale comments as genet/Cargo.toml.
[patch.crates-io]
# Cambium's version-only edge otherwise pulls the published 0.1.0 graph,
# which still selects the old Stylo 0.16 links crate beside genet-stylo 0.19.
genet-scripted-dom = { path = "../../components/genet-scripted-dom" }
layout-dom-api = { path = "../../components/shared/layout-dom" }
# stylo_taffy fork vendored at 0.3.0-beta.1, re-targeted at the
# genet-stylo fork surface (the old stylo/stylo_atoms git redirect is
# gone — genet-stylo 0.19 is the one `links = "servo_style_crate"`).
stylo_taffy = { path = "../../support/patches/stylo_taffy" }
# taffy fork re-vendored on 0.12.1 (float fixes + flex `order`).
taffy = { path = "../../support/patches/taffy" }
# ahash runtime-rng/getrandom-0.3 drop for the wasm graph.
sonic-rs = { path = "../../support/patches/sonic-rs-0.5.8" }
