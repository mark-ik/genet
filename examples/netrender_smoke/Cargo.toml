[package]
name = "netrender-smoke"
version = "0.1.0"
edition = "2024"
publish = false

# Standalone project — intentionally NOT a servo-wgpu workspace member.
# The servo-wgpu workspace Cargo.toml patches webrender from a path that no
# longer exists (renamed to netrender in commit c9481b04b of webrender-wgpu);
# that patch failure blocks the full workspace. This example proves the
# netrender embedder hookup independently, without Servo.
#
# Build:
#   cargo run --manifest-path examples/netrender_smoke/Cargo.toml
# from servo-wgpu/ root.

[[bin]]
name = "netrender-smoke"
path = "src/main.rs"

