[package]
name = "wgpu-embedder"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true

[[bin]]
name = "wgpu-embedder"
path = "src/main.rs"

[dependencies]
dpi = { workspace = true }
env_logger = { workspace = true }
euclid = { workspace = true }
keyboard-types = { version = "0.8.3" }
log = { workspace = true }
paint_api = { workspace = true, features = ["wgpu_backend"] }
# Use same feature set as `cargo check -p servo` (default features) to reuse
# cached build artifacts and avoid a full mozjs rebuild.
servo = { version = "0.1.0", path = "../../components/servo" }
winit = { workspace = true }
