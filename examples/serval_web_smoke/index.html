<!doctype html>
<meta charset="utf-8">
<title>serval web smoke</title>
<style>
  body { margin: 0; background: #0c0e12; display: grid; place-items: center; height: 100vh; }
  canvas { outline: 1px solid #2a2f3a; }
</style>
<canvas id="smoke" width="900" height="600"></canvas>
<script type="module">
  // Surface panics / JS failures in the title so external automation can
  // read the outcome without CDP. console_error_panic_hook reports panics
  // via console.error.
  const origError = console.error.bind(console);
  console.error = (...a) => {
    if (!document.title.startsWith("SMOKE")) {
      document.title = "ERR: " + a.map(String).join(" ").slice(0, 300);
    }
    origError(...a);
  };
  window.addEventListener("error", (e) => {
    if (!document.title.startsWith("SMOKE")) {
      document.title = "JS ERR: " + e.message;
    }
  });
  try {
    const m = await import("./pkg/serval_web_smoke.js");
    await m.default();
  } catch (e) {
    document.title = "INIT FAIL: " + e;
  }
</script>
