[package]
name = "non-presenting-wgpu-embedder"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true

[[bin]]
name = "non-presenting-wgpu-embedder"
path = "src/main.rs"

[features]
# Default: full Servo integration path (screenshot harness).
default = ["servo_integration"]
# Servo integration — all Servo/WebRender/winit deps. Enabled by default.
# Disable with --no-default-features when using netrender_backend.
servo_integration = [
    "dep:dpi",
    "dep:euclid",
    "dep:image",
    "dep:paint_api",
    "dep:rustls",
    "dep:servo",
    "dep:url",
    "dep:winit",
]
# Bypass Servo; prove netrender API against this embedder's wgpu context.
# Build: cargo run -p non-presenting-wgpu-embedder \
#            --features netrender_backend --no-default-features
netrender_backend = ["dep:netrender"]

[dependencies]
# Always present — needed by both paths.
pollster = "0.4"
wgpu = { workspace = true }

# Servo integration (optional; enabled by servo_integration feature).
dpi = { workspace = true, optional = true }
euclid = { workspace = true, optional = true }
image = { workspace = true, optional = true }
paint_api = { workspace = true, features = ["wgpu_backend"], optional = true }
rustls = { workspace = true, features = ["aws-lc-rs"], optional = true }
