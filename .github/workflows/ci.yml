name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Dependency-cone witnesses
        run: python3 support/ci/check_dependency_cones.py
      - name: Set up Java for TLC
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: TLA witnesses
        run: |
          curl -L -o "$RUNNER_TEMP/tla2tools.jar" https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
          python3 support/ci/check_scheduler_trace_tla.py --tla-tools-jar "$RUNNER_TEMP/tla2tools.jar"
          python3 support/ci/check_post_message_trace_tla.py --tla-tools-jar "$RUNNER_TEMP/tla2tools.jar"
      - name: Workspace check
        run: cargo check --workspace --all-targets
      - name: Workspace tests
        run: cargo test --workspace --all-targets
      - name: Layout wasm witness
        run: cargo check -p genet-layout --target wasm32-unknown-unknown
