[package]
name = "cambium-nematic"
version = "0.2.0"
description = "Cambium-native views and themes for Nematic smolweb content"
edition.workspace = true
rust-version.workspace = true
license = "MPL-2.0"
repository.workspace = true
readme = "README.md"
publish = true

[dependencies]
cambium = { version = "0.2.0", path = "../cambium" }
errand = "0.1.3"

[dev-dependencies]
layout_dom_api = { package = "layout-dom-api", version = "0.1.0" }
serval-scripted-dom = { package = "genet-scripted-dom", version = "0.1.0" }
