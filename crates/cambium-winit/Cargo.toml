[package]
name = "cambium-winit"
version = "0.3.0"
description = "winit input translation for Cambium applications"
edition.workspace = true
rust-version.workspace = true
license = "MPL-2.0"
repository.workspace = true
publish = true

[dependencies]
cambium = { version = "0.3.0", path = "../cambium" }
sprigging = { version = "0.2.0", path = "../sprigging" }
winit = "0.30.13"
# The a11y host (src/a11y.rs) projects a laid-out genet DOM into an AccessKit
# tree with each Sprigging leaf's own semantics, and drives the platform adapter.
# Genet crates by git branch (apps redirect to local checkouts via [patch]).
genet-layout = { git = "https://github.com/mark-ik/genet.git", branch = "main" }
genet-winit-host = { git = "https://github.com/mark-ik/genet.git", branch = "main" }
genet-scripted-dom = { git = "https://github.com/mark-ik/genet.git", branch = "main" }
layout-dom-api = { git = "https://github.com/mark-ik/genet.git", branch = "main" }
accesskit = "0.24"
