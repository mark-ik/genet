[package]
name = "cambium"
version = "0.2.0"
description = "A Meristem backend and application toolkit for Genet"
edition.workspace = true
rust-version.workspace = true
license = "MPL-2.0"
repository.workspace = true
publish = true

[features]
highlight = ["dep:illume", "dep:tinct"]

[dependencies]
meristem = { version = "0.1.0", path = "../meristem" }
sprigging = { version = "0.1.0", path = "../sprigging" }
genet-scripted-dom = { git = "https://github.com/mark-ik/genet.git", branch = "main" }
layout_dom_api = { package = "layout-dom-api", git = "https://github.com/mark-ik/genet.git", branch = "main" }
unicode-segmentation = "1.13.2"
illume = { version = "=0.0.2", optional = true }
tinct = { version = "=0.1.2", optional = true }
