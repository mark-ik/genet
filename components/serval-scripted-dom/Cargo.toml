[package]
name = "serval-scripted-dom"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Mutable scripted-DOM provider: LayoutDom + LayoutDomMut over a NodeId arena, recording DomMutations for serval-layout invalidation."

[lib]
name = "serval_scripted_dom"
path = "lib.rs"

[dependencies]
engine_observables_api = { workspace = true }
layout-dom-api = { path = "../shared/layout-dom", features = ["capture"] }
markup5ever = { workspace = true }
# The HTML serializer (the `serialize` fn + `SerializeOpts` + void-element/escaping
# logic) lives in html5ever; markup5ever only carries the `Serialize`/`Serializer`
# traits. Already a serval workspace dep (serval-static-dom uses it for parsing).
html5ever = { workspace = true }
# Reused for `set_inner_html` fragment parsing: parse via StaticDocument (a LayoutDom),
# then walk it into the mutable arena. Avoids a second TreeSink impl.
serval-static-dom = { path = "../serval-static-dom" }

[dev-dependencies]
postcard = { workspace = true }
