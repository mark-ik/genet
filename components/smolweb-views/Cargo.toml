# SPDX-License-Identifier: MPL-2.0
[package]
name = "smolweb-views"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Native xilem-serval views for smolweb formats (gemtext, …) with per-site and preset theming."

[lib]
name = "smolweb_views"
path = "src/lib.rs"

[dependencies]
# The reactive view layer (element views, clickable, AnyView, ServalCtx). serval
# renders these the same path as host chrome and the djot note tile.
xilem-serval = { path = "../xilem-serval" }
# The smolweb parse layer (per-format ASTs). Git dep (sibling-crate convention);
# the local `.cargo/config.toml` path override speeds cross-repo edits.
errand = { workspace = true }

[dev-dependencies]
# Build views into a real ScriptedDom and inspect the result in tests.
serval-scripted-dom = { path = "../serval-scripted-dom" }
layout_dom_api = { package = "layout-dom-api", path = "../shared/layout-dom" }
