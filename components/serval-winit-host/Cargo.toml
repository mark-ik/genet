[package]
name = "serval-winit-host"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false
rust-version = "1.92.0"
description = "Shared serval-on-winit host plumbing: a wgpu surface + netrender Renderer (boot / resize / rasterize / acquire) and winit->serval key/modifier mapping. Consumed by the meerkat chrome shell, the orrery host, and pelt so each owns only its scene composition + input routing, not the present boilerplate."

[lib]
name = "serval_winit_host"
path = "src/lib.rs"

[dependencies]
# The present stack: a netrender Renderer rasterizes serval scenes and composites
# them onto the surface (workspace path dep on the sibling netrender checkout).
netrender = { workspace = true }
# Key / modifier mapping targets serval's input model (KeyEvent / Modifiers).
xilem-serval = { path = "../xilem-serval" }
# Windowing + wgpu surface (workspace pins: winit 0.30 / wgpu 29).
winit = { workspace = true }
wgpu = { version = "29", default-features = false, features = ["std", "wgsl"] }
