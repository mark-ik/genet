[package]
name = "cambium-nematic"
version = "0.3.0"
description = "Cambium-native views and themes for Nematic smolweb content"
edition.workspace = true
rust-version = "1.92"
license = "MPL-2.0"
repository = "https://github.com/mark-ik/genet"
readme = "README.md"
publish = true

[dependencies]
cambium = { version = "0.3.0", path = "../cambium" }
errand = "0.1.3"

[dev-dependencies]
layout_dom_api = { package = "layout-dom-api", path = "../../shared/layout-dom" }
genet-scripted-dom = { path = "../../genet-scripted-dom" }
