[package]
name = "cambium"
version = "0.3.0"
description = "A Meristem backend and application toolkit for Genet"
edition.workspace = true
rust-version = "1.92"
license = "MPL-2.0"
repository = "https://github.com/mark-ik/genet"
publish = true

[features]
highlight = ["dep:illume", "dep:tinct"]

[dependencies]
meristem = { version = "0.1.0", path = "../meristem" }
sprigging = { version = "0.2.0", path = "../sprigging" }
genet-scripted-dom = { version = "0.1.0", path = "../../genet-scripted-dom" }
layout_dom_api = { package = "layout-dom-api", version = "0.1.0", path = "../../shared/layout-dom" }
unicode-segmentation = "1.13.2"
illume = { version = "=0.0.2", optional = true }
tinct = { version = "=0.1.2", optional = true }
