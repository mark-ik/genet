[package]
name = "sprigging"
version = "0.2.1"
description = "Retained custom-paint leaves and arrangement helpers for Rust GUI hosts"
edition.workspace = true
rust-version = "1.92"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mark-ik/genet"
publish = true

[dependencies]
paint_list_api = { version = "0.1.0", git = "https://github.com/mark-ik/netrender.git", branch = "main" }
accesskit = { version = "0.24.0", features = ["serde"] }
vello = { version = "0.9", default-features = false }
