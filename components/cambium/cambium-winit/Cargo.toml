[package]
name = "cambium-winit"
version = "0.3.0"
description = "winit input translation for Cambium applications"
edition.workspace = true
rust-version = "1.92"
license = "MPL-2.0"
repository = "https://github.com/mark-ik/genet"
publish = true

[dependencies]
cambium = { version = "0.3.0", path = "../cambium" }
sprigging = { version = "0.2.0", path = "../sprigging" }
winit = "0.30.13"
# The a11y host (src/a11y.rs) projects a laid-out genet DOM into an AccessKit
# tree with each Sprigging leaf's own semantics, and drives the platform adapter.
# Genet crates by path — cambium became a genet component on 2026-07-23, so the
# git pins and the [patch] redirection they needed are gone.
genet-layout = { path = "../../genet-layout" }
genet-winit-host = { path = "../../genet-winit-host" }
genet-scripted-dom = { path = "../../genet-scripted-dom" }
layout-dom-api = { path = "../../shared/layout-dom" }
accesskit = "0.24"
