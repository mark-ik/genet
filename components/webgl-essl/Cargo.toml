[package]
name = "servo-webgl-essl"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description.workspace = true

[lib]
name = "webgl_essl"
path = "lib.rs"

[dependencies]
# Step 6 lowering path A: ESSL -> SPIR-V (rspirv) -> naga IR (spv-in)
# -> WGSL (wgsl-out). Pinned to the naga that ships with wgpu 29.
naga = { version = "29", default-features = false, features = ["spv-in", "wgsl-out"] }
rspirv = "0.13"
