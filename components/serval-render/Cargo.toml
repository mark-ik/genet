[package]
name = "serval-render"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Serval host render-driver: a ScriptedDom / LayoutDom -> netrender::Scene assembly (cascade -> layout -> paint emit -> Scene), plus the host spatial queries (hit-test, fragments, caret / selection rects) and accessibility-tree emission. The thin, GPU-free glue serval-side hosts share, sitting on serval-layout + paint_list_render; scene *production*, separate from presentation (serval-winit-host)."

[lib]
name = "serval_render"
path = "src/lib.rs"

[dependencies]
# The serval DOM + the engine pipeline this drives.
serval-scripted-dom = { path = "../serval-scripted-dom" }
serval-layout = { path = "../serval-layout" }
layout_dom_api = { workspace = true }
# Paint-list -> netrender::Scene lowering (aliased `paint`), the Scene type, and
# the paint/query value types.
paint = { workspace = true }
paint_list_api = { workspace = true }
netrender = { workspace = true }
# Engine-observable query surface: hit_test (point -> node) behind FragmentQuery.
engine_observables_api = { workspace = true }
# Accessibility tree emission: ScriptedDom -> accesskit::TreeUpdate (a host
# concern, kept out of the core layout crate).
accesskit = { workspace = true }
# taffy must match serval-layout's experimental pin (layout() takes a taffy::Size
# viewport); euclid for the viewport size the image planes carry.
taffy = { version = "=0.12.1", default-features = false, features = ["std", "taffy_tree", "block_layout", "flexbox", "grid", "float_layout", "calc", "content_size", "detailed_layout_info"] }
euclid = { workspace = true }

[dev-dependencies]
# A parsed HTML document for the content-introspection (`inspect`) tests.
serval-static-dom = { path = "../serval-static-dom" }
