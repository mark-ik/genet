<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>presenting wgpu smoke</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; font-family: sans-serif; }
    .quad   { position: absolute; width: 160px; height: 120px; }
    .tl     { left:   0px; top:   0px; background: #ff0000; }
    .tr     { left: 160px; top:   0px; background: linear-gradient(to right, #00FF00, #00CC00); }
    .bl     { left:   0px; top: 120px; background: radial-gradient(circle at center, #0000FF, #000080); }
    .br     { left: 160px; top: 120px; background: #ffffff; }
    .br-clip { width: 160px; height: 120px; background: #000000; border-radius: 50%; }
    .image-strip { position: absolute; left:   0px; top: 240px; width: 160px; height: 80px; }
    .image-strip img { display: block; width: 100%; height: 100%; }
    .text-strip { position: absolute; left: 160px; top: 240px; width: 160px; height: 80px;
                  background: #ffffff; color: #000000; font-size: 36px; font-weight: 700;
                  text-align: center; line-height: 80px; }
  </style>
</head>
<body>
  <div class="quad tl"></div>
  <div class="quad tr"></div>
  <div class="quad bl"></div>
  <div class="quad br"><div class="br-clip"></div></div>
  <div class="image-strip"><img src="swatch.png" alt="swatch"></div>
  <div class="text-strip">OK</div>
</body>
</html>
