# VENDORED, not genet-authored. This is a verbatim mirror of Linebender's
# `xilem_core` (Apache-2.0), the pure reactive diff/message core of Xilem. It
# was previously a git dep on the mark-ik/xilem fork (branch
# `mere-wgpu-29-vello-0-9`), but `xilem_core` is byte-identical to upstream main
# there — the branch's vello/wgpu/parley bumps live in *other* xilem crates, not
# this one — so vendoring it loses no fork-specific changes and removes genet's
# last xilem git dep. `xilem-serval` is the only consumer.
#
# Re-sync: copy `src/` from upstream `xilem_core` verbatim over `src/` here; this
# manifest is the only genet-managed file. `tests/` and `examples/` from
# upstream are intentionally not vendored (they exercise xilem_core itself, not
# genet, and would add compile targets to genet's workspace).
#
# Package fields are explicit (NOT inherited from genet's `[workspace.package]`)
# because this is foreign code: the license is Apache-2.0 (not genet's MPL-2.0),
# the repository is upstream, and the version tracks the upstream release we
# mirrored (0.4.0), not genet's 0.2.0.
[package]
name = "serval-xilem-core"
version = "0.4.0"
description = "Genet's vendored mirror of Linebender's xilem_core (Apache-2.0): the pure reactive diff/message core of Xilem, tracked from upstream main past the 0.4.0 release. Published under the genet- prefix so genet's view crates can publish; upstream authorship and license unchanged."
edition = "2024"
rust-version = "1.92"
license = "Apache-2.0"
repository = "https://github.com/linebender/xilem"
publish = true

[lib]
name = "xilem_core"
path = "src/lib.rs"

[features]
kurbo = ["dep:kurbo"]

[dependencies]
# tracing + kurbo unify on genet's workspace pins (0.1.44 / 0.13, both
# compatible with upstream xilem's 0.1.44 / 0.13.1). hashbrown + anymore are
# xilem_core-only, so they stay inline here rather than in workspace.dependencies.
tracing = { workspace = true }
kurbo = { workspace = true, optional = true }
hashbrown = { version = "0.17.0", default-features = false, features = ["default-hasher"] }
anymore = "1.0.0"
