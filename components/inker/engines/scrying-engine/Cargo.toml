[package]
name = "scrying-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "inker SurfaceEngine implementation backed by the scrying system-WebView producer (WebView2 / WKWebView / WebKitGTK)."
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
inker.workspace = true
# Sibling repo consumed one-way; a **git dep** (not a path dep) so a bare clone
# builds without the `wgpu-scry` sibling layout. A local checkout is picked up via
# the gitignored `.cargo/config.toml` `paths` override.
scrying = { git = "https://github.com/mark-ik/wgpu-scry.git", branch = "main" }
dpi.workspace = true
tracing.workspace = true
