[package]
name = "spartan-protocol"
version = "0.1.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/mark-ik/genet"
description = "A spec-faithful implementation of the Spartan protocol (spartan://): async client, server with a handler seam, static file serving, and a CLI. Plaintext smolweb with uploads via the =: prompt."
keywords = ["spartan", "smolweb", "gemini", "protocol", "gemtext"]
categories = ["network-programming"]

[features]
default = []
# The `spartan` command-line tool (fetch / submit / serve).
cli = ["tokio/rt", "tokio/macros", "tokio/signal"]

[[bin]]
name = "spartan"
path = "src/bin/spartan.rs"
required-features = ["cli"]

[dependencies]
url = "2.5"
percent-encoding = "2.3"
# IDN hosts must reach the request line as punycode (spec 5); the url crate
# only applies IDNA to its special schemes, so spartan:// converts explicitly.
# Already in url's own dependency tree, so effectively free.
idna = "1"
tokio = { version = "1", default-features = false, features = ["macros", "net", "io-util", "rt", "time", "fs"] }
log = "0.4"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["rt", "macros", "net", "io-util", "sync", "time"] }
tempfile = "3"
