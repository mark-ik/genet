[package]
name = "guppy-protocol"
version = "0.1.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/mark-ik/genet"
description = "An implementation of the Guppy protocol v0.4.4 (guppy://): async UDP client and server with chunking, acknowledgement, and retransmission, plus a CLI. The smolweb-over-UDP protocol."
keywords = ["guppy", "smolweb", "udp", "gemini", "protocol"]
categories = ["network-programming"]

[features]
default = []
# The `guppy` command-line tool (fetch / serve).
cli = ["tokio/rt", "tokio/macros", "tokio/signal"]

[[bin]]
name = "guppy"
path = "src/bin/guppy.rs"
required-features = ["cli"]

[dependencies]
url = "2.5"
percent-encoding = "2.3"
tokio = { version = "1", default-features = false, features = ["macros", "net", "io-util", "time", "fs"] }
log = "0.4"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["rt", "macros", "net", "io-util", "sync", "time"] }
tempfile = "3"
