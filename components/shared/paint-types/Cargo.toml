[package]
name = "genet-paint-types"
version = "0.1.0"
repository = "https://github.com/mark-ik/genet"
publish = true
authors.workspace = true
license.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Shared paint-tier types for the genet engine family: the vocabulary the paint and observables layers exchange (rects, colors, image keys) without a renderer dependency."

[lib]
name = "paint_types"
path = "lib.rs"

[dependencies]
app_units = { workspace = true }
euclid = { workspace = true, features = ["serde"] }
malloc_size_of = { workspace = true }
malloc_size_of_derive = { workspace = true }
serde = { workspace = true, features = ["derive"] }
