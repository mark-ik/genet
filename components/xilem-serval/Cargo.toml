[package]
name = "xilem-serval"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
publish.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "A xilem_core backend that diffs a Xilem view tree into serval's mutable ScriptedDom."

[lib]
name = "xilem_serval"
path = "src/lib.rs"

# Third reactive backend beside Masonry (`xilem`) and the browser DOM
# (`xilem_web`), pointed at serval's `LayoutDomMut`. We take only the
# diff/message core, not the Masonry renderer, so we depend on `xilem_core`
# directly rather than `xilem`.
# `xilem_core` is vendored into the workspace at `components/xilem-core` (a
# verbatim Apache-2.0 mirror of upstream main; see that crate's header). It was
# previously a git dep on the mark-ik/xilem fork, but the fork's vello/wgpu/parley
# divergence lives in other xilem crates, not `xilem_core`, so vendoring is
# loss-free and lets a bare serval clone resolve without any xilem fork checkout.
[dependencies]
xilem_core = { path = "../xilem-core" }
serval-scripted-dom = { path = "../serval-scripted-dom" }
layout_dom_api = { package = "layout-dom-api", path = "../shared/layout-dom" }
