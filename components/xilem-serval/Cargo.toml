[package]
# The `serval-` prefix is the family convention for serval-coupled
# infrastructure (own components + forks: serval-chisel, serval-xilem-core,
# serval-stylo, ...); adopted independents that serve any host keep their own
# names (inker, tinct, illume, verso-tile). This crate is serval's xilem host,
# so it takes the prefix — and in that order: `xilem-*` is Linebender's
# namespace, and publishing into it would imply an affiliation that does not
# exist. The `[lib]` name stays `xilem_serval`, so no consumer's imports churn.
name = "serval-xilem"
version = "0.1.0"
repository = "https://github.com/mark-ik/serval"
publish = true
authors.workspace = true
license.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "A xilem_core backend that diffs a Xilem view tree into serval's mutable ScriptedDom."

[lib]
name = "xilem_serval"
path = "src/lib.rs"

[features]
# Syntax-highlighted text fields: the styled field pre-wired with a lexer (illume)
# and a palette (tinct), so any serval host gets highlighted djot/code/entity
# editing for free. Off by default — a host that only wants a plain field pays no
# jotdown/logos/tinct dep. See `src/highlight.rs`.
highlight = ["dep:illume", "dep:tinct"]

# Third reactive backend beside Masonry (`xilem`) and the browser DOM
# (`xilem_web`), pointed at serval's `LayoutDomMut`. We take only the
# diff/message core, not the Masonry renderer, so we depend on `xilem_core`
# directly rather than `xilem`.
# `xilem_core` is vendored into the workspace at `components/xilem-core` (a
# verbatim Apache-2.0 mirror of upstream main; see that crate's header). It was
# previously a git dep on the mark-ik/xilem fork, but the fork's vello/wgpu/parley
# divergence lives in other xilem crates, not `xilem_core`, so vendoring is
# loss-free and lets a bare serval clone resolve without any xilem fork checkout.
[dependencies]
# Arrangement placements (Placement / VirtualWindow) for the `placed` /
# `arrangement` views — the view half of chisel's tier-3 arrangement leaf.
chisel = { package = "serval-chisel", version = "0.1.0", path = "../chisel" }
xilem_core = { package = "serval-xilem-core", version = "0.4.0", path = "../xilem-core" }
serval-scripted-dom = { version = "0.1.0", path = "../serval-scripted-dom" }
layout_dom_api = { package = "layout-dom-api", version = "0.1.0", path = "../shared/layout-dom" }
# UAX#29 word boundaries for Ctrl+←/→ word motion + Ctrl+Backspace/Delete kill-word
# in `TextInput` (the buffer owns word segmentation; the host just sends the key).
unicode-segmentation = { workspace = true }
# The `highlight` feature's lexer + palette (optional). illume emits (range, kind)
# spans; tinct maps a role to a contrast-gated colour. This crate owns the
# kind -> role -> class map that joins them (src/highlight.rs).
illume = { workspace = true, optional = true }
tinct = { workspace = true, optional = true }
