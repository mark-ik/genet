# Local path overrides (gitignored, local-dev only) — OPTIONAL, never committed.
#
# Convention: genet's committed manifests reference every sibling repo by GIT
# (`git = "https://github.com/mark-ik/<repo>", branch = "main"`), so a bare clone
# builds anywhere by fetching from GitHub. This file redirects those git-deps to
# local working copies when present, so cross-repo edits rebuild without a push +
# `cargo update`. A `paths` entry whose directory is absent is silently ignored by
# cargo (resolution falls back to the committed git-dep), so deleting this file —
# or cloning on a machine without these checkouts — Just Works.
#
# A `paths` entry overrides a crate of the same name + version found anywhere under
# it; it coexists with a `[patch]` on the same crate (the path override wins). It is
# a no-op for any build whose graph doesn't reference that crate.
# (errand + illume left this list 2026-07-10: both are workspace members now,
# and a paths override would shadow the in-tree copies.)
paths = [
    "C:/Users/mark_/Code/repos/netrender",
    "C:/Users/mark_/Code/repos/netfetcher",
    "C:/Users/mark_/Code/crates/boa",
    "C:/Users/mark_/Code/crates/piccolo",
    "C:/Users/mark_/Code/crates/vano/nova_vm",
]

# The LOCAL stylo fork (Code/crates/stylo): carries the subtree-cascade
# sharing-cache fix (insert_if_possible skips candidates whose traversal
# parent has no style data - the forest-dom window-root shape). Local dev
# loop until genet-stylo 0.19.1 publishes; the committed manifest stays on
# the registry family.
[patch.crates-io]
genet-stylo = { path = "C:/Users/mark_/Code/crates/stylo/style" }
genet-stylo-atoms = { path = "C:/Users/mark_/Code/crates/stylo/stylo_atoms" }
genet-stylo-dom = { path = "C:/Users/mark_/Code/crates/stylo/stylo_dom" }
genet-stylo-static-prefs = { path = "C:/Users/mark_/Code/crates/stylo/stylo_static_prefs" }
genet-stylo-traits = { path = "C:/Users/mark_/Code/crates/stylo/style_traits" }
stylo_malloc_size_of = { path = "C:/Users/mark_/Code/crates/stylo/malloc_size_of" }
servo_arc = { path = "C:/Users/mark_/Code/crates/stylo/servo_arc" }
selectors = { path = "C:/Users/mark_/Code/crates/stylo/selectors" }
