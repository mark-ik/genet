[package]
name = "webrender"
version = "0.68.0"
edition = "2021"
publish = false

[features]
capture = []
replay = []
dynamic_freetype = []
# Match the workspace.dependencies declaration's feature set so the
# patched stub satisfies the requested feature list.
wgpu_backend = []

# Stub replacing the webrender/ directory removed in webrender-wgpu commit
# c9481b04b (rename: webrender → netrender, 2026-04-30).
#
# The servo-wgpu workspace depends on a fork-specific webrender crate that
# lived at ../webrender-wgpu/webrender/. That path no longer exists.
# This stub restores workspace loadability so the netrender_backend feature
# path compiles without requiring the full Servo stack.
#
# The servo_integration code path (painter.rs wgpu_backend feature) will
# fail to compile against this stub — that port belongs to a separate lane
# when painter.rs is updated to call create_netrender_instance directly.
